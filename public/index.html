<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VidSnap OCR - Advanced Text Extraction</title>
  <link rel="stylesheet" href="style.css" />

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2850229497443585"
     crossorigin="anonymous"></script>
</head>
<body>

  <div class="card">
    <h2>🔍 VidSnap OCR - Advanced AI Text Extraction</h2>
    <p style="font-size: 12px; color: #666; margin: 5px 0 15px 0;">
      Auto language detection • Image preprocessing • Table detection • Multi-format export
    </p>

    <input type="file" id="file" accept="image/*,video/*" title="Select image or video file" />

    <div style="display:flex; gap:8px; margin-top:12px;">
      <select id="format" title="Choose output format">
        <option value="">— No auto-convert —</option>
        <option value="txt">📄 TXT (Plain Text)</option>
        <option value="pdf">📕 PDF</option>
        <option value="docx">📗 DOCX (Word)</option>
        <option value="xlsx">📊 XLSX (Excel)</option>
        <option value="rtf">📙 RTF</option>
      </select>

      <button id="extractBtn" style="flex: 1;">Extract Text</button>
    </div>

    <div id="result" class="hidden">
      <h3>✅ OCR Result</h3>

      <div id="ocrInfo" class="hidden"></div>

      <pre id="output"></pre>

      <div style="display:flex; gap:8px; margin-top:8px;">
        <button id="convertBtn">📥 Convert & Download</button>
        <a id="downloadLink" class="hidden" href="#" download>📥 Download file</a>
      </div>
    </div>

    <p id="status"></p>
  </div>

  <script src="/app.js"></script>

  <footer style="font-size: 0.85rem; margin: 12px auto; max-width: 720px; color: #444; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; text-align: center;">
    <a href="about.html">About</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
    <a href="contact.html">Contact</a>
  </footer>

</body>
</html>
