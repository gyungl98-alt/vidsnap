<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VidSnap OCR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>VidSnap OCR</h2>

    <input type="file" id="file" accept="image/*,video/*" />

    <div style="display:flex; gap:8px; margin-top:12px;">
      <select id="format" title="Choose output format">
        <option value="">— No auto-convert —</option>
        <option value="pdf">PDF</option>
        <option value="docx">DOCX</option>
        <option value="txt">TXT</option>
        <option value="rtf">RTF</option>
        <option value="xlsx">XLSX</option>
      </select>

      <button id="extractBtn">Extract Text</button>
    </div>

    <div id="result" class="hidden">
      <h3>OCR Result</h3>

      <pre id="output"></pre>

      <div style="display:flex; gap:8px; margin-top:8px;">
        <button id="convertBtn">Convert & Download</button>
        <a id="downloadLink" class="hidden" href="#" download>Download file</a>
      </div>
    </div>

    <p id="status"></p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
